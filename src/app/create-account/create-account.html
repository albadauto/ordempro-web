<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-gray-100 to-gray-200 p-6">

  <div class="w-full max-w-lg bg-white/90 backdrop-blur-md rounded-2xl shadow-2xl border border-gray-100 p-8">

    <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">
      Nova Conta
    </h2>

    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-5">

      <!-- Nome -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Nome
        </label>

        <div class="relative group">
          <input
            type="text"
            formControlName="name"
            placeholder="Nome da empresa"
            class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl shadow-sm
                   focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200
                   outline-none transition duration-200
                   group-focus-within:ring-2 group-focus-within:ring-indigo-100"
          />
        </div>
      </div>

      <!-- Email -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Email
        </label>

        <div class="relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
            ✉️
          </span>
          <input
            type="email"
            formControlName="email"
            placeholder="email@empresa.com"
            class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl shadow-sm
                   focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200
                   outline-none transition duration-200"
          />
        </div>
      </div>

      <!-- Senha -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          Senha
        </label>

        <div class="relative">
          <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400">
            🔒
          </span>
          <input
            type="password"
            formControlName="password"
            placeholder="********"
            class="w-full pl-10 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl shadow-sm
                   focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200
                   outline-none transition duration-200"
          />
        </div>
      </div>

      <!-- CNPJ -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          CNPJ
        </label>

        <input
          type="text"
          formControlName="cnpj"
          placeholder="00.000.000/0001-00"
          class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl shadow-sm
                 focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200
                 outline-none transition duration-200"
          (input)="onCnpjInput()"

        />
      </div>

      <!-- WhatsApp -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">
          WhatsApp
        </label>

        <input
          type="text"
          formControlName="whatsapp"
          placeholder="(11) 99999-9999"
          class="w-full px-4 py-3 bg-gray-50 border border-gray-200 rounded-xl shadow-sm
                 focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200
                 outline-none transition duration-200"
          (input)="onPhoneInput()"

        />
      </div>

      <!-- Botão -->
      <button
        type="submit"
        [disabled]="form.invalid || isLoading"
        class="w-full bg-[#050a30] text-white py-3 rounded-xl font-semibold
               hover:scale-[1.02] hover:shadow-lg hover:bg-black
               active:scale-[0.98]
               transition duration-200 disabled:opacity-50 disabled:hover:scale-100"
      >
        @if(isLoading){
          <span>Carregando...</span>
        } @else {
          Criar nova conta
        }
      </button>

    </form>

  </div>

</div>
