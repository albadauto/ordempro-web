@if (authService.auth$ | async) {
  <div class="min-h-screen bg-gray-100 flex p-4 gap-4">

    <!-- Overlay (mobile) -->
    @if (open) {
      <div
        class="fixed inset-0 bg-black/40 z-40 md:hidden"
        (click)="open = false">
      </div>
    }

    <!-- Sidebar -->
    <aside
      class="fixed z-50 top-4 left-4 h-[calc(100vh-2rem)] w-64
         bg-[#050a30] text-white
         rounded-2xl shadow-2xl border border-gray-800
         flex flex-col transition-transform duration-300

         md:static  md:translate-x-0 md:flex"
      [class.-translate-x-[120%]]="!open"
    >

      <!-- Logo -->
      <div class="px-6 py-5 text-xl font-semibold border-b border-gray-800">
        <img src="/assets/img/logo-white.png">
      </div>

      <nav class="flex-1 px-4 py-6 space-y-3 text-sm">

        <!-- Dashboard -->
        <a
          routerLink="/main"
          class="flex items-center px-4 py-3 rounded-xl hover:bg-white/5 transition font-medium">
          Dashboard
        </a>

        <!-- Ordens -->
        <div class="space-y-2">

          <button
            (click)="toggleDropdown()"
            class="w-full flex items-center justify-between px-4 py-3 rounded-xl
             bg-white/5 hover:bg-white/10 transition border border-white/10">

            <span class="font-medium">Ordens de Serviço</span>
            <span class="transition text-xs" [class.rotate-180]="isOpen">▼</span>
          </button>

          @if (isOpen) {
            <div class="ml-2 space-y-1">

              <a routerLink="/services-order"
                 class="block px-4 py-2 rounded-lg text-gray-300 hover:text-white hover:bg-white/10 transition">
                Listar Ordens
              </a>

              <a routerLink="/services-order/list-delivered"
                 class="block px-4 py-2 rounded-lg text-gray-300 hover:text-white hover:bg-white/10 transition">
                Ordens entregues
              </a>

            </div>
          }
        </div>
        <!-- Clientes -->
        <a
          routerLink="/customers"
          class="flex items-center px-4 py-3 rounded-xl hover:bg-white/5 transition font-medium">
          Clientes
        </a>

      </nav>
      <!-- Footer -->
      <div class="p-4 border-t border-gray-800">
        <button class="w-full bg-white/10 hover:bg-white/20 rounded-xl py-2" (click)="authService.logout()">
          Sair
        </button>
      </div>

    </aside>

    <!-- Conteúdo -->
    <main class="flex-1 p-4 md:p-6">

      <!-- Botão mobile -->
      <button
        (click)="open = true"
        class="md:hidden mb-4 bg-gray-900 text-white px-4 py-2 rounded-lg">
        ☰ Menu
      </button>

      <!-- 🔥 AQUI ENTRA SUAS ROTAS -->
      <div class="bg-white rounded-2xl shadow-md p-6 min-h-full">
        <router-outlet></router-outlet>
      </div>

    </main>

  </div>

} @else {
  <router-outlet></router-outlet>
}
