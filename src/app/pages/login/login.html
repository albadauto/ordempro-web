<div class="min-h-screen flex items-center justify-center">

<div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">

  <div class="text-center mb-6">
    <div class="flex items-center justify-center mb-2">
      <img src="assets/img/logo.png" width="300"/>
    </div>
    <p class="text-gray-500">Entre na sua conta</p>
    @if(loginFailed()){
      <div class="bg-red-200 p-2 rounded-md mt-2">
        E-mail ou senha incorreto(s)
      </div>
    }
  </div>
@if(accountIsCreated){
  <div class="bg-green-200 p-4 rounded-xl mb-3 mt-3">
    Conta criada com sucesso!
  </div>
}
  <form class="space-y-5" [formGroup]="form" (ngSubmit)="submit()">

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      <div class="relative">
        <input
          type="email" formControlName="email"
          placeholder="seu@email.com"
          class="w-full px-4 py-3 border border-gray-200 rounded-xl shadow-sm bg-gray-50
             focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200
             focus:outline-none transition duration-200"
        >
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Senha</label>
      <div class="relative">
        <input formControlName="password"
          type="password"
          placeholder="••••••••"
          class="w-full px-4 py-3 border border-gray-200 rounded-xl shadow-sm bg-gray-50
             focus:bg-white focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200
             focus:outline-none transition duration-200"
        >
      </div>
    </div>

    <div class="flex items-center justify-between text-sm">
      <label class="flex items-center gap-2">
        <input type="checkbox" class="rounded text-[#050a30]">
        Lembrar-me
      </label>
      <a href="#" class="text-[#050a30] hover:underline">Esqueceu a senha?</a>
    </div>
    <button
      type="submit"
      class="w-full bg-[#050a30] text-white py-2 rounded-lg hover:bg-black transition duration-200 font-semibold"
    >
      Entrar
    </button>

  </form>

  <p class="text-center text-sm text-gray-500 mt-6">
    Não tem conta?
    <button routerLink="/create-account" class="text-[#050a30] font-medium hover:underline">Criar conta</button>
  </p>

</div>
</div>
