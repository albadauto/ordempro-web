<div class="max-w-1xl mx-auto bg-white rounded-2xl shadow-lg p-6">
  <!-- Header -->
  <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
    <h2 class="text-2xl font-bold text-gray-800">Cadastro de Clientes</h2>
    <input
      type="text"
      [(ngModel)]="searchTerm"
      (input)="filteredUsers()"
      placeholder="Pesquisar cliente..."
      class="border border-gray-300 rounded-xl px-4 py-2 w-full sm:w-64 focus:outline-none focus:ring-2 focus:ring-blue-500"
    />
    <a class="bg-[#050a30] hover:bg-gray-800 text-white px-4 py-2 rounded-xl shadow flex items-center gap-2 transition w-full sm:w-auto justify-center" routerLink="/customers/new">
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
      </svg>
      Adicionar Cliente
    </a>
  </div>

  <!-- Table -->
  <div class="overflow-x-auto">
    <table class="w-full text-left border-collapse">
      <thead>
      <tr class="bg-gray-50 text-gray-600 text-sm uppercase">
        <th class="p-4">Nome</th>
        <th class="p-4">Email</th>
        <th class="p-4">Endereço</th>
        <th class="p-4">Número</th>
        <th class="p-4">Whatsapp</th>
        <th class="p-4"></th>
        <th class="p-4"></th>
      </tr>
      </thead>
      <tbody class="divide-y">
      @if(isLoading){
        <p>Carregando...</p>
      } @else {
        @for (customer of filteredUsersList; track customer.name){
          <tr class="hover:bg-gray-50 transition">
            <td class="p-4 flex items-center gap-3">
              <span class="font-medium text-gray-800">{{ customer.name }}</span>
            </td>
            <td class="p-4 text-gray-600">{{ customer.email }}</td>
            <td class="p-4 text-gray-600">{{ customer.address }}</td>
            <td class="p-4 text-gray-600">{{ customer.number }}</td>
            <td class="p-4 text-gray-600">{{ customer.whatsapp }}</td>
            <td class="p-4 text-gray-600">
              <a class="text-red-500" (click)="deleteCustomer(customer.id)">
              <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                <path stroke-linecap="round" stroke-linejoin="round" d="m14.74 9-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 0 1-2.244 2.077H8.084a2.25 2.25 0 0 1-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 0 0-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 0 1 3.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 0 0-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 0 0-7.5 0" />
              </svg>
            </a>
            </td>
            <td class="p-4 text-gray-600">
              <button class="text-yellow-500" (click)="editCustomer(customer.id)">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="size-6">
                  <path stroke-linecap="round" stroke-linejoin="round" d="m16.862 4.487 1.687-1.688a1.875 1.875 0 1 1 2.652 2.652L6.832 19.82a4.5 4.5 0 0 1-1.897 1.13l-2.685.8.8-2.685a4.5 4.5 0 0 1 1.13-1.897L16.863 4.487Zm0 0L19.5 7.125" />
                </svg>

              </button>
            </td>
          </tr>
        }
      }

      </tbody>
    </table>
  </div>

</div>
