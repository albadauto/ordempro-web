

<div class="p-6 ">
  @if(messageForm){
    <div class="bg-green-200 p-6 rounded-lg shadow-2xl font-bold mb-5">
      {{ messageForm }}
    </div>
  }

  <div class="flex justify-between items-center mb-2">
    <h1 class="text-2xl font-bold">Ordens de Serviço</h1>
    <a class="bg-[#050a30] text-white px-4 py-2 rounded-xl hover:bg-black" routerLink="/services-order/new">
      Nova Ordem
    </a>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3">
    @for (serviceOrder of serviceOrders; track serviceOrder.orderNumber) {
      <!-- Card 1 -->
      <div class="bg-gray-100 shadow-2xl rounded-2xl p-4 space-y-3">
        <div class="flex justify-between items-center">
          <h2 class="font-semibold text-lg">#{{ serviceOrder.orderNumber }}</h2>
          <span [ngClass]="getBadgeClass(serviceOrder.status.id)" class="text-black text-sm px-2 py-1 rounded-full">
          {{ serviceOrder.status.title }}
        </span>
        </div>

        <div>
          <p class="text-sm text-gray-500">Cliente</p>
          <p class="font-medium">{{ serviceOrder.customer.name}}</p>
        </div>

        <div>
          <p class="text-sm text-gray-500">Observação</p>
          <p class="font-medium">{{ serviceOrder.obs }}</p>
        </div>

        <div class="flex justify-between items-center">
          <p class="text-sm text-gray-500"></p>
          <div class="flex gap-2">
            <button class="border px-3 py-1 rounded-lg text-sm">Ver</button>
            <button class="bg-[#050a30] text-white px-3 py-1 rounded-lg text-sm hover:bg-gray-700">
              Editar
            </button>
          </div>
        </div>
      </div>
    }




  </div>
</div>
